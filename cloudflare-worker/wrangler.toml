name = "mcss-telegram-webhook"
main = "worker.js"
compatibility_date = "2024-11-01"

# Non-sensitive config (safe to commit).
[vars]
GITHUB_OWNER = "ipwcchristopher"
GITHUB_REPO = "MCSS_STS"

# Secrets are NOT stored here. Set them with `wrangler secret put <NAME>`:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_WEBHOOK_SECRET
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put AUTHORIZED_CHAT_ID
