# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# MCSS Daily Swing Trade Screener - GitHub Actions Workflow
#
# Required Secrets (repo Settings > Secrets > Actions):
#   GEMINI_API_KEY       - used by ai_catalyst.py (Phase 4 onwards)
#   TELEGRAM_BOT_TOKEN   - REQUIRED for live push (scheduled / on-demand runs HARD-FAIL if missing)
#   TELEGRAM_CHAT_ID     - REQUIRED for live push
#   ALPACA_API_KEY       - optional: faster data fetch via Alpaca bulk snapshot
#   ALPACA_API_SECRET    - optional: paired with ALPACA_API_KEY
#
# Triggers:
#   schedule            - cron (UTC), Mon-Fri:
#                           0 13 * * 1-5  -> HKT 21:00 same day  (pre-market)
#                           0 21 * * 1-5  -> HKT 05:00 next day  (post-market)
#   repository_dispatch - on-demand from the Cloudflare Worker / Telegram bot:
#                           event type: "mcss_run"
#                           client_payload: { "session": "pre-market" | "post-market" }
#   workflow_dispatch   - manual run from the Actions tab (with session + dry_run inputs)

name: MCSS Daily Swing Trade Screen

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '0 21 * * 1-5'
  repository_dispatch:
    types: [mcss_run]
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run'
        type: choice
        options:
          - post-market
          - pre-market
        default: post-market
      dry_run:
        description: 'Dry run (print Telegram instead of sending)'
        type: boolean
        default: false

concurrency:
  group: mcss-daily-screen
  cancel-in-progress: false

env:
  GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
  TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
  TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}"
  ALPACA_API_KEY: "${{ secrets.ALPACA_API_KEY }}"
  ALPACA_API_SECRET: "${{ secrets.ALPACA_API_SECRET }}"
  # DRY is assigned at runtime via $GITHUB_ENV in the "Resolve session and dry-run
  # mode" step. Declared here with a fail-safe default ("false" = treat as live run)
  # so the Actions linter knows env.DRY exists — silences the false-positive
  # "Context access might be invalid: DRY". The runtime write always overrides it.
  DRY: "false"

jobs:
  screen:
    name: Run MCSS Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}"
          restore-keys: "${{ runner.os }}-pip-"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Resolve session and dry-run mode
        # Untrusted inputs (client_payload is attacker-settable on repository_dispatch)
        # are passed via env, never interpolated into the script, then allowlisted.
        env:
          EVENT: ${{ github.event_name }}
          PAYLOAD_SESSION: ${{ github.event.client_payload.session }}
          INPUT_SESSION: ${{ github.event.inputs.session }}
          INPUT_DRY: ${{ github.event.inputs.dry_run }}
        run: |
          case "$EVENT" in
            repository_dispatch)
              RAW_SESSION="$PAYLOAD_SESSION"; DRY="false" ;;
            workflow_dispatch)
              RAW_SESSION="$INPUT_SESSION"; DRY="$INPUT_DRY" ;;
            *)
              # schedule: derive from UTC hour (13 -> pre-market, else post-market)
              HOUR=$(date -u +%H)
              if [ "$HOUR" = "13" ]; then RAW_SESSION="pre-market"; else RAW_SESSION="post-market"; fi
              DRY="false" ;;
          esac
          # Allowlist validation — never trust the raw value
          case "$RAW_SESSION" in
            pre-market|post-market) SESSION="$RAW_SESSION" ;;
            *) SESSION="post-market" ;;
          esac
          case "$DRY" in
            true) DRY="true" ;;
            *) DRY="false" ;;
          esac
          echo "SESSION=$SESSION" >> "$GITHUB_ENV"
          echo "DRY=$DRY" >> "$GITHUB_ENV"
          echo "Resolved: event=$EVENT session=$SESSION dry_run=$DRY"

      # Surfaces the previously-silent failure mode: on any LIVE run the
      # Telegram secrets must be present AND the token must be valid, or the
      # job fails RED instead of completing green with nothing delivered.
      - name: Verify Telegram secrets (live runs only)
        if: ${{ env.DRY != 'true' }}
        run: |
          MISSING=0
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is EMPTY. Add it in repo Settings > Secrets and variables > Actions."
            MISSING=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::TELEGRAM_CHAT_ID secret is EMPTY. Add it in repo Settings > Secrets and variables > Actions."
            MISSING=1
          fi
          if [ "$MISSING" = "1" ]; then
            echo "::error::Telegram secrets missing -> scheduled push would deliver NOTHING. Failing the run on purpose."
            exit 1
          fi
          # Validate the token actually works (catches wrong/rotated tokens) without printing it.
          OK=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | grep -c '"ok":true' || true)
          if [ "$OK" != "1" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN is set but Telegram getMe rejected it (token wrong or revoked)."
            exit 1
          fi
          echo "Telegram secrets present and token validated."

      - name: Run MCSS Pipeline
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          python scripts/run_pipeline.py --session "$SESSION" $DRY_RUN_FLAG

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "mcss-run-${{ github.run_id }}"
          path: data/
          retention-days: 7
