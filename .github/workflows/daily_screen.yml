# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# MCSS Daily Swing Trade Screener - GitHub Actions Workflow
#
# Required Secrets (repo Settings > Secrets > Actions):
#   GEMINI_API_KEY       - used by ai_catalyst.py (Phase 4 onwards)
#   TELEGRAM_BOT_TOKEN   - required for live push (leave empty for dry-run)
#   TELEGRAM_CHAT_ID     - required for live push (leave empty for dry-run)
#
# Schedule (UTC):
#   0 13 * * 1-5  -> HKT 21:00 same day  (pre-market)
#   0 21 * * 1-5  -> HKT 05:00 next day  (post-market)

name: MCSS Daily Swing Trade Screen

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: mcss-daily-screen
  cancel-in-progress: false

env:
  GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
  TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
  TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}"

jobs:
  screen:
    name: Run MCSS Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}"
          restore-keys: "${{ runner.os }}-pip-"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine session type
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "13" ]; then
            echo "SESSION=pre-market" >> $GITHUB_ENV
          else
            echo "SESSION=post-market" >> $GITHUB_ENV
          fi

      - name: Run MCSS Pipeline
        run: |
          DRY_RUN_FLAG=""
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/run_pipeline.py --session "$SESSION" $DRY_RUN_FLAG

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "mcss-run-${{ github.run_id }}"
          path: data/
          retention-days: 7
